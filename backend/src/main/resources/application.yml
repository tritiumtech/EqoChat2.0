spring:
  application:
    name: eqochat-backend
  
  servlet:
    multipart:
      max-file-size: 60MB
      max-request-size: 60MB
  
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:192.168.28.56}:${MYSQL_PORT:3306}/eqochat2?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:Root!!2018}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 10
          max-idle: 8
    neo4j:
      uri: ${NEO4J_URI:bolt://localhost:7687}
      authentication:
        username: ${NEO4J_USERNAME:neo4j}
        password: ${NEO4J_PASSWORD:password}
  main:
    allow-bean-definition-overriding: true

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: delToken
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:your-secret-key-here-change-in-production}
  expiration: 86400000 # 24 hours

eqochat:
  world:
    upload-dir: ${EQOCHAT_WORLD_UPLOAD_DIR:./data/world-uploads}
    max-image-bytes: 5242880
    max-video-bytes: 52428800
    share-url-template: ${EQOCHAT_WORLD_SHARE_URL_TEMPLATE:http://127.0.0.1:5173/#/pages/world/world?postId={postId}}

logging:
  level:
    com.eqochat: DEBUG
    org.springframework.security: DEBUG
